<html lang="de">
<head>
<meta charset="utf-8">
<title>Shortlink Loader</title>
</head>
<body style="font-family: sans-serif;">
<script>
  // Hash ohne "#" (das ist der Dateiname ohne Endung)
  const key = location.hash.slice(1);

  // Basis-URL für GitHub Raw Dateien
  const baseURL = "https://raw.githubusercontent.com/einkilometer/strudel/refs/heads/main/raw/";

  if (key) {
    // Baue die URL: baseURL + key + ".txt"
    fetch(baseURL + key + ".txt")
      .then(r => {
        if (!r.ok) throw new Error("Datei nicht gefunden"); 
        return r.text();
      })
      .then(c => {
        location = "https://strudel.cc/#" + c;
      })
      .catch(e => {
        // Fehlerbehandlung, falls die Datei auf GitHub nicht existiert
        document.body.innerHTML = `<h1 style="color:red;">Fehler</h1><p>Die Datei <b>${key}.txt</b> wurde nicht gefunden.</p><a href="https://github.com/einkilometer/strudel">github.com/einkilometer/strudel</a>`;
      });
  } else {
    // Fallback, wenn gar kein Hash übergeben wurde (z.B. nur index.html aufgerufen)
    document.body.innerHTML = "<h1>Bitte gib einen Shortcut an (z.B. #260124)</h1><br><a href='https://github.com/einkilometer/strudel'>github.com/einkilometer/strudel</a>";
  }
</script>
</body>
</html>
