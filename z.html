<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <title>Shortlink Searcher</title>
</head>
<body style="font-family: sans-serif; text-align: center; padding-top: 50px;">
  <div id="status"></div>
  <script>
    const baseURL = "https://raw.githubusercontent.com/einkilometer/strudel/refs/heads/main/raw/";
    const statusDiv = document.getElementById("status");
    // Hash analysieren (z.B. "#z10" -> "z10")
    const hash = location.hash.slice(1);
    // Hilfsfunktion für zufällige Pause (2-4 Sekunden)
    const wait = () => new Promise(res => setTimeout(res, Math.random() * 2000 + 2000));

    async function startSearch() {
      // Fallback, wenn kein Hash vorhanden ist oder er nicht mit 'z' beginnt
      if (!hash || !hash.startsWith('z')) {
        statusDiv.innerHTML = `
          <h1 style='font-family:sans-serif;'>404</h1>      
          <p><a href="https://github.com/einkilometer/strudel/z.html#z260128">github.com/einkilometer/strudel/z.html#z260128</a><br><br>
          <a href="https://github.com/einkilometer/strudel">github.com/einkilometer/strudel</a></p>`;
        return;
      }
      // Extrahiere die Zahl aus "z10" -> 10
      let currentNum = parseInt(hash.substring(1), 10);
      let attempts = 0;
      const maxAttempts = 10;

      // Falls parseInt fehlschlägt (z.B. wenn nur #z ohne Zahl übergeben wurde)
      if (isNaN(currentNum)) {
        statusDiv.innerHTML = "<h1 style='color:red;'>Error</h1><p>please alike ...#z10</p>";
        return;
      }

      while (attempts < maxAttempts) {
        const fileName = `z${currentNum}.txt`;
        statusDiv.textContent = `looking for ${fileName}...`;
        
        try {
          const response = await fetch(baseURL + fileName);     
          if (response.ok) {
            // Datei gefunden!
            const content = await response.text();
            statusDiv.textContent = `OK`;
            location = "https://strudel.cc/#" + encodeURIComponent(content);
            return; 
        
          } else {
            // Datei nicht vorhanden (404)
            attempts++;
            if (attempts >= maxAttempts) break;
            const nextNum = currentNum + 1;
            const nextFile = `z${nextNum}.txt`;
            statusDiv.innerHTML = `<br><br><h1>404</h1><p>... search for something alike #z${nextNum}</p>`;
            await wait();
            currentNum = nextNum;
          }
        } catch (error) {
          statusDiv.textContent = "Network Error.";
          return;
        }
      }

      // Wenn 10 Versuche ohne Erfolg waren
      showRetryButton(currentNum);
    }

    function showRetryButton(lastNum) {
      statusDiv.innerHTML = `
        <h1 style="color:red;">404</h1>
        <p>Retry!</p>
        <button id="retryBtn" style="padding: 10px 20px; cursor: pointer; font-size: 16px;">
          z${lastNum + 1}
        </button>
        <br><br>
        <a href="https:///einkilometer.github.com/strudel/z.html#z260128">/einkilometer.github.com/strudel/z.html#z260128</a><br>
        <a href="https://github.com/einkilometer/strudel">github.com/einkilometer/strudel</a>
      `;

      document.getElementById("retryBtn").onclick = () => {
        location.hash = `z${lastNum + 1}`;
        location.reload();
      };
    }
    // Start des Prozesses
    startSearch();
  </script>
</body>
</html>
