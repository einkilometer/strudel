<html lang="de">
<head>
<meta charset="utf-8">
<title>Shortlink Searcher</title>
</head>
<body style="font-family: sans-serif; text-align: center; padding-top: 50px;">
<div id="status"></div>

<script>
  const baseURL = "https://raw.githubusercontent.com/einkilometer/strudel/refs/heads/main/raw/";
  const statusDiv = document.getElementById("status");
  
  // Hash analysieren (z.B. "#z10" -> "z10")
  const hash = location.hash.slice(1);
  
  // Hilfsfunktion für zufällige Pause (1-2 Sekunden)
  const wait = () => new Promise(res => setTimeout(res, Math.random() * 1000 + 1000));

  async function startSearch() {
    if (!hash || !hash.startsWith('z')) {
      statusDiv.innerHTML = "<h1>Shortcut</h1><p>einkilometer.github.io/strudel/z.html#z260127</p>";
      return;
    }

    // Extrahiere die Zahl aus "z10" -> 10
    let currentNum = parseInt(hash.substring(1), 10);
    let attempts = 0;
    const maxAttempts = 10;

    while (attempts < maxAttempts) {
      const fileName = `z${currentNum}.txt`;
      statusDiv.textContent = `looking for ${fileName}...`;

      try {
        const response = await fetch(baseURL + fileName);
        
        if (response.ok) {
          // Datei gefunden!
          const content = await response.text();
          statusDiv.textContent = `OK`;
          location = "https://strudel.cc/#" + encodeURIComponent(content);
          return; // Beendet die Funktion
        } else {
          // Datei nicht vorhanden (404)
          attempts++;
          if (attempts >= maxAttempts) break;

          const nextNum = currentNum + 1;
          const nextFile = `z${nextNum}.txt`;
          
          statusDiv.innerHTML = `
            <p style="color: red;"https://raw.githubusercontent.com/einkilometer/strudel/refs/heads/main/raw/${fileName} :-( 404.</p>
            <p> <b>${nextFile}</b> trying ... ${attempts}</p>
          `;
          
          await wait();
          currentNum = nextNum;
        }
      } catch (error) {
        statusDiv.textContent = "Network Error.";
        return;
      }
    }

    // Wenn wir hier ankommen, wurden 10 Versuche ohne Erfolg abgeschlossen
    showRetryButton(currentNum);
  }

  function showRetryButton(lastNum) {
    statusDiv.innerHTML = `
      <h1 style="color:red;">404</h1>
      <p>Retry!</p>
      <button id="retryBtn" style="padding: 10px 20px; cursor: pointer; font-size: 16px;">
      z${lastNum + 1}
      </button>
      <br><br>
       <a href="https://github.com/einkilometer/strudel/z#z260128">github.com/einkilometer/strudel/z.html#z260128</a>
      <a href="https://github.com/einkilometer/strudel">github.com/einkilometer/strudel</a>
    `;

    document.getElementById("retryBtn").onclick = () => {
      // Wir simulieren einen neuen Start mit der nächsten Zahl
      // Da die URL nicht geändert wird, müssen wir die Funktion manuell triggern
      location.hash = `z${lastNum + 1}`;
      startSearch(); 
      // Hinweis: Da location.hash die Seite nicht neu lädt, 
      // müsste man die Logik leicht anpassen oder einfach die Seite neu laden:
      location.reload();
    };
  }

  // Start des Prozesses
  startSearch();
</script>
</body>
</html>
