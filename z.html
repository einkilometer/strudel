<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <title>Shortlink Searcher</title>
  <!-- Lokal gehostete QR-Library -->
  <script src="qrious.min.js"></script>
</head>
<body style="font-family: sans-serif; text-align: center; padding-top: 50px;">
  <div id="status"></div>

  <script>
    const baseURL = "https://raw.githubusercontent.com/einkilometer/strudel/refs/heads/main/raw/";
    const statusDiv = document.getElementById("status");
    const wait = () => new Promise(res => setTimeout(res, Math.random() * 2000 + 2000));

    // --- HILFSFUNKTION für Datum und Zeit ---
    function getFormattedNow() {
      const now = new Date();
      const pad = (num) => String(num).padStart(2, '0');
      const day = pad(now.getDate());
      const month = pad(now.getMonth() + 1);
      const year = String(now.getFullYear()).slice(-2);
      const hours = pad(now.getHours());
      const mins = pad(now.getMinutes());
      return `${hours}:${mins} ${day}.${month}.${year}`;
    }
    // ---------------------------------------

    async function startSearch() {
      const hash = location.hash.slice(1);
      const timestamp = getFormattedNow(); // Aktuelle Zeit holen
      
      // --- TITEL UPDATE MIT ZEITSTEMPEL ---
      let pageTitle = "-";
      if (hash) { 
        pageTitle = `#${hash} ${timestamp}`; 
      }
      document.title = pageTitle;
      history.replaceState({ title: pageTitle }, pageTitle, window.location.href);
      // -------------------------------------

      if (!hash || !hash.startsWith('z')) {
        statusDiv.innerHTML = `<h1 style='font-family:sans-serif;'>404</h1><a href="https://raw.githubusercontent.com/einkilometer/strudel/refs/heads/main/README.md">README.md</a>`;
        return;
      }

      let currentNum = parseInt(hash.substring(1), 10);
      if (isNaN(currentNum)) {
        statusDiv.innerHTML = `<h1 style='font-family:sans-serif;'>404</h1><a href="https://raw.githubusercontent.com/einkilometer/strudel/refs/heads/main/README.md">README.md</a>`;
        return;
      }

      let attempts = 0;
      const maxAttempts = 5;

      while (attempts < maxAttempts) {
        const fileName = `z${currentNum}.txt`;
        statusDiv.textContent = `Suche nach ${fileName}... (Versuch ${attempts + 1}/${maxAttempts})`;
        
        try {
          const response = await fetch(baseURL + fileName);     
          if (response.ok) {
            let content = await response.text();
            content = content.trim(); 
            if (content.includes('#')) {
              content = content.slice(content.indexOf('#') + 1);
            }

            const foundTimestamp = getFormattedNow(); // Zeit zum Zeitpunkt des Fundes
            
            // Titel beim Finden nochmal aktualisieren
            const finalTitle = `#z${currentNum} ${foundTimestamp}`;
            document.title = finalTitle;

            statusDiv.innerHTML = `
              [Strg]+[r] [Cmd]+[r] [Ctrl]+[r] weiter ... #z${currentNum}
              <a href="https://strudel.cc/#${content}">${window.location.href}</a>
              <canvas id="qr-canvas"></canvas>
              ${foundTimestamp}
            `;

            new QRious({
              element: document.getElementById('qr-canvas'),
              value: window.location.href,
              size: 400
            });

            await new Promise(res => setTimeout(res, 3000)); 
            location.href = "https://strudel.cc/#" + content; 
            return; 
          } else {
            attempts++;
            currentNum++; 
            if (attempts < maxAttempts) {
              statusDiv.innerHTML = `Datei nicht gefunden. Warte kurz, dann versuche ich z${currentNum}.txt...`;
              await wait();
            }
          }
        } catch (error) {
          console.error(error);
          statusDiv.textContent = "Ein Fehler ist aufgetreten. Bitte Seite neu laden.";
          return;
        }
      }
      showRetryButton(currentNum - 1);
    }

    function showRetryButton(lastNum) {
      statusDiv.innerHTML = `
        <h1 style="color:red;">404</h1>
        <p>Keine passende Datei gefunden.</p>
        <button id="retryBtn" style="padding: 10px 20px; cursor: pointer; font-size: 16px;">
          Suche weiter ab z${lastNum + 1}
        </button>
        <br><br>
        <a href="https://raw.githubusercontent.com/einkilometer/strudel/refs/heads/main/README.md">README.md</a>
      `;
      document.getElementById("retryBtn").onclick = () => {
        const nextHash = `z${lastNum + 1}`;
        const nextTimestamp = getFormattedNow();
        const nextTitle = `#${nextHash} ${nextTimestamp}`;
        
        document.title = nextTitle;
        history.pushState({ title: nextTitle }, nextTitle, `#${nextHash}`);
        startSearch();
      };
    }

    startSearch();
  </script>
</body>
</html>
