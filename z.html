<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <title>Shortlink Searcher</title>
</head>
<body style="font-family: sans-serif; text-align: center; padding-top: 50px;">
  <div id="status"></div>
  <script>
    const baseURL = "https://raw.githubusercontent.com/einkilometer/strudel/refs/heads/main/raw/";
    const statusDiv = document.getElementById("status");
    
    // Helper for random pause
    const wait = () => new Promise(res => setTimeout(res, Math.random() * 2000 + 2000));

    async function startSearch() {
      // --- MOVED INSIDE: Read the hash every time the function starts ---
      const hash = location.hash.slice(1);
      
      if (!hash || !hash.startsWith('z')) {
        statusDiv.innerHTML = `
          <h1 style='font-family:sans-serif;'>404</h1>      
          <a href="https://raw.githubusercontent.com/einkilometer/strudel/refs/heads/main/README.md">README.md</a>
          `;
        return;
      }

      let currentNum = parseInt(hash.substring(1), 10);
      
      if (isNaN(currentNum)) {
        statusDiv.innerHTML = `
          <h1 style='font-family:sans-serif;'>404</h1>      
          <a href="https://raw.githubusercontent.com/einkilometer/strudel/refs/heads/main/README.md">README.md</a>
          `;
        return;
      }

      let attempts = 0;
      const maxAttempts = 5;

      while (attempts < maxAttempts) {
        const fileName = `z${currentNum}.txt`;
        statusDiv.textContent = `Suche nach ${fileName}... (Versuch ${attempts + 1}/${maxAttempts})`;
        
        try {
          const response = await fetch(baseURL + fileName);     
          if (response.ok) {
            let content = await response.text();
            content = content.trim(); 
            if (content.includes('#')) {
              content = content.slice(content.indexOf('#') + 1);
            }
            statusDiv.textContent = `Gefunden! Leite weiter...`;
            location.href = "https://strudel.cc/#" + content; 
            return; 
          } else {
            attempts++;
            currentNum++; 
            
            if (attempts < maxAttempts) {
              statusDiv.innerHTML = `Datei nicht gefunden. Warte kurz, dann versuche ich z${currentNum}.txt...`;
              await wait();
            }
          }
        } catch (error) {
          console.error(error);
          statusDiv.textContent = "Ein Fehler ist aufgetreten. Bitte Seite neu laden.";
          return;
        }
      }

      showRetryButton(currentNum - 1);
    }

    function showRetryButton(lastNum) {
      statusDiv.innerHTML = `
        <h1 style="color:red;">404</h1>
        <p>Keine passende Datei gefunden.</p>
        <button id="retryBtn" style="padding: 10px 20px; cursor: pointer; font-size: 16px;">
          Suche weiter ab z${lastNum + 1}
        </button>
        <br><br>
        <a href="https://raw.githubusercontent.com/einkilometer/strudel/refs/heads/main/README.md">README.md</a>
      `;

      document.getElementById("retryBtn").onclick = () => {
        // 1. Change the hash (this creates a new entry in browser history)
        location.hash = `z${lastNum + 1}`;
        
        // 2. Call the search function again WITHOUT reloading the page
        startSearch();
      };
    }

    // Start the first search on page load
    startSearch();
  </script>
</body>
</html>
